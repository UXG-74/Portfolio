<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('portfolio-theme');
          var useDark = saved !== 'light';
          if (!useDark) return;
          document.documentElement.style.background = '#1e1e1e';
          document.documentElement.style.color = '#f3f3f3';
          var s = document.createElement('style');
          s.id = 'portfolio-theme-preload';
          s.textContent = 'body{background:#1e1e1e;color:#f3f3f3} .site-header,.nav-drawer,.site-footer{background:#1e1e1e}';
          document.head.appendChild(s);
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="page contact-page">
    <a class="skip-link" href="#main">Skip to content</a>
    <header class="site-header">
      <div class="shell header-row">
        <a class="logo" href="index.html">Ged Devine</a>
        <nav class="nav-primary" aria-label="Primary">
          <a href="work.html">Work</a>
          <a href="about.html">About</a>
          <a href="contact.html#cv" aria-current="page">CV</a>
        </nav>
        <div class="header-tools">
          <a class="btn-contact" href="contact.html">Contact</a>
        </div>
        <button type="button" class="menu-toggle" data-nav-toggle aria-expanded="false" aria-controls="nav-drawer" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16" stroke-linecap="round" />
          </svg>
        </button>
      </div>
      <div class="shell nav-drawer" id="nav-drawer" data-nav-mobile>
        <a href="work.html">Work</a>
        <a href="about.html">About</a>
        <a href="contact.html#cv">CV</a>
        <div class="drawer-tools">
          <a class="btn-contact" href="contact.html">Contact</a>
        </div>
      </div>
    </header>

    <main id="main" class="contact-main">
      <div class="shell contact-layout">
        <h1 class="contact-kicker">Let's talk</h1>

            <a class="contact-line contact-line--primary" href="mailto:geddevine@hotmail.com">geddevine@hotmail.com</a>

          <ul class="contact-social" aria-label="Social links">
            <li><a href="#">Instagram&nbsp;→</a></li>
            <li><a href="#">LinkedIn&nbsp;→</a></li>
          </ul>
        </div>

        <div class="contact-address-block">
          <address class="contact-address">
            Colony, Jactin House, 24 Hood Street<br />
            Ancoats, Manchester M4 6WX
          </address>
          <p class="contact-maps-wrap">
            <a class="contact-maps" href="https://maps.google.com" target="_blank" rel="noopener noreferrer">Google Maps</a>
          </p>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="shell footer-inner">
        <p>© <span id="y"></span> Ged Devine</p>
        <div class="footer-links">
          <a href="contact.html">Get in touch</a>
          <a href="#">LinkedIn</a>
        </div>
      </div>
    </footer>
    <script>
      document.getElementById("y").textContent = new Date().getFullYear();
    </script>
    <script src="js/main.js"></script>

</html>
